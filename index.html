<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#F5C842;
  --gold2:#E8A020;
  --gold3:#FFF0A0;
  --dark:#080A12;
  --dark2:#0E1020;
  --dark3:#141828;
  --wa:#25D366;
  --wa2:#128C7E;
  --urgent:#FF4040;
  --text:#DDE1F0;
  --muted:rgba(220,225,240,0.42);
}

html,body{
  background:var(--dark);
  color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  overflow-x:hidden;
  min-height:100vh;
}

/* ── BG ATMOSPHERE ── */
.bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 90% 55% at 50% 0%,rgba(200,140,20,.14) 0%,transparent 60%),
    radial-gradient(ellipse 55% 45% at 90% 65%,rgba(0,80,200,.09) 0%,transparent 55%),
    radial-gradient(ellipse 40% 35% at 10% 75%,rgba(140,0,200,.06) 0%,transparent 55%),
    var(--dark);
}
.bg::after{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.012'%3E%3Cpath d='M40 38v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V4h-2v4h-4v2h4v4h2V10h4V8h-4z'/%3E%3C/g%3E%3C/svg%3E");
}

/* ── LAYOUT ── */
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding-bottom:90px;}

/* ── NAV ── */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 20px;
  background:rgba(8,10,18,.82);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(245,200,66,.12);
  position:sticky;top:0;z-index:200;
}
.nav-logo{
  font-family:'Cinzel',serif;
  font-size:20px;font-weight:700;letter-spacing:3px;
  background:linear-gradient(135deg,#fff 0%,var(--gold) 60%,var(--gold2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.live-pill{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,64,64,.12);
  border:1px solid rgba(255,64,64,.3);
  border-radius:20px;padding:5px 12px;
  font-size:11px;font-weight:700;color:#ff8080;letter-spacing:.8px;
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--urgent);animation:livePulse 1.4s infinite;}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* ── STORE HERO CARD ── */
.store-hero{
  margin:20px 16px 0;
  background:linear-gradient(160deg,rgba(255,255,255,.05) 0%,rgba(255,255,255,.02) 100%);
  border:1px solid rgba(245,200,66,.18);
  border-radius:22px;
  padding:20px;
  position:relative;
  overflow:hidden;
}
.store-hero::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,200,66,.08) 0%,transparent 70%);
  pointer-events:none;
}

.hero-top{display:flex;gap:16px;align-items:flex-start;margin-bottom:18px;}

.hero-icon-wrap{position:relative;flex-shrink:0;}
.hero-icon{
  width:82px;height:82px;border-radius:20px;
  object-fit:cover;display:block;
  border:2px solid rgba(245,200,66,.35);
  box-shadow:0 0 0 4px rgba(245,200,66,.07),0 12px 32px rgba(0,0,0,.5);
}
.icon-verified{
  position:absolute;bottom:-4px;right:-4px;
  width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;border:2px solid var(--dark);
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}

.hero-info{flex:1;min-width:0;}
.hero-category{
  font-size:10px;font-weight:700;letter-spacing:1.5px;
  color:var(--gold2);text-transform:uppercase;margin-bottom:5px;
}
.hero-game-title{
  font-family:'Cinzel',serif;
  font-size:19px;font-weight:700;line-height:1.15;
  color:#fff;margin-bottom:2px;
}
.hero-game-sub{
  font-family:'Cinzel',serif;
  font-size:13px;font-weight:600;
  color:var(--gold);letter-spacing:.5px;
  margin-bottom:8px;
}
.hero-dev{font-size:11px;color:var(--muted);margin-bottom:10px;}

.stars-row{display:flex;align-items:center;gap:5px;margin-bottom:12px;}
.stars{font-size:13px;color:var(--gold);letter-spacing:2px;}
.stars-num{font-size:12px;font-weight:700;color:var(--gold3);}
.stars-count{font-size:11px;color:var(--muted);}

.hero-order-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--wa),var(--wa2));
  color:#fff;font-size:13px;font-weight:800;letter-spacing:.3px;
  padding:11px 20px;border-radius:12px;border:none;cursor:pointer;
  text-decoration:none;
  box-shadow:0 4px 18px rgba(37,211,102,.35);
  transition:transform .2s,box-shadow .2s;
  white-space:nowrap;
}
.hero-order-btn:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 8px 28px rgba(37,211,102,.5);}

/* Stats row */
.hero-stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;overflow:hidden;
  background:rgba(255,255,255,.025);
  margin-bottom:16px;
}
.h-stat{
  padding:12px 6px;text-align:center;
  border-right:1px solid rgba(255,255,255,.06);
}
.h-stat:last-child{border-right:none;}
.h-stat-val{font-size:15px;font-weight:800;color:var(--gold);line-height:1;margin-bottom:3px;}
.h-stat-lbl{font-size:9px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;}

/* Tags */
.hero-tags{display:flex;gap:7px;flex-wrap:wrap;}
.h-tag{
  font-size:10px;font-weight:700;letter-spacing:.5px;
  padding:4px 11px;border-radius:7px;
  background:rgba(245,200,66,.09);
  border:1px solid rgba(245,200,66,.18);
  color:var(--gold);
}

/* ── BANNERS ── */
.banners-wrap{margin:18px 16px 0;}
.slider{
  position:relative;border-radius:16px;overflow:hidden;
  border:1px solid rgba(245,200,66,.14);
  box-shadow:0 16px 48px rgba(0,0,0,.55);
  aspect-ratio:16/7;background:#0d1020;
}
.slide{position:absolute;inset:0;opacity:0;transition:opacity .9s ease;}
.slide.active{opacity:1;}
.slide img{width:100%;height:100%;object-fit:cover;display:block;}
.slider-dots{display:flex;justify-content:center;gap:6px;margin-top:10px;}
.dot{
  width:6px;height:6px;border-radius:3px;
  background:rgba(255,255,255,.18);cursor:pointer;
  transition:all .35s ease;
}
.dot.active{width:24px;background:var(--gold);}

/* ── URGENCY ── */
.urgency{
  margin:16px 16px 0;
  background:rgba(255,64,64,.08);
  border:1px solid rgba(255,64,64,.22);
  border-radius:14px;padding:13px 16px;
  display:flex;align-items:center;gap:12px;
}
.urg-icon{font-size:22px;flex-shrink:0;}
.urg-text{flex:1;}
.urg-title{font-size:13px;font-weight:800;color:#ffb3b3;margin-bottom:2px;}
.urg-sub{font-size:11px;color:rgba(255,180,180,.55);}
.urg-count{
  font-size:32px;font-weight:900;
  color:var(--urgent);line-height:1;
  font-variant-numeric:tabular-nums;
  animation:blink 1.6s infinite;
  flex-shrink:0;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}

/* ── SECTION TITLE ── */
.sec{padding:30px 16px 0;}
.sec-eyebrow{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;
  color:var(--gold2);margin-bottom:8px;
}
.sec-eyebrow::before{content:'';display:block;width:14px;height:2px;background:var(--gold2);border-radius:1px;}
.sec-title{
  font-family:'Cinzel',serif;
  font-size:26px;font-weight:700;letter-spacing:1px;
  color:#fff;line-height:1.1;margin-bottom:4px;
}
.sec-sub{font-size:12px;color:var(--muted);font-style:italic;}

/* ── ACCOUNT GRID ── */
.acc-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:14px 16px 0;
}
.acc-card{
  border-radius:16px;overflow:hidden;
  background:var(--dark2);
  border:1px solid rgba(245,200,66,.1);

  animation:fadeUp .55s ease forwards;
  transition:transform .3s cubic-bezier(.25,.8,.25,1),box-shadow .3s,border-color .3s;
  cursor:pointer;
}
.acc-card:hover{
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 20px 50px rgba(0,0,0,.55),0 0 28px rgba(245,200,66,.1);
  border-color:rgba(245,200,66,.3);
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}

.img-wrap{position:relative;width:100%;aspect-ratio:3/4;overflow:hidden;background:var(--dark3);}
.img-wrap img{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  display:block;
  transition:transform .5s cubic-bezier(.25,.8,.25,1);
}
.acc-card:hover .img-wrap img{transform:scale(1.06);}

.c-badge{
  position:absolute;top:9px;left:9px;
  font-size:8px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;
  padding:3px 9px;border-radius:6px;

  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.badge-hot{
  position:absolute;top:9px;right:9px;

  padding:3px 8px;border-radius:6px;z-index:2;

  animation:pulseBadge 2s infinite;
  box-shadow:0 2px 10px rgba(255,64,64,.4);
}
@keyframes pulseBadge{0%,100%{box-shadow:0 2px 10px rgba(255,64,64,.4)}50%{box-shadow:0 2px 18px rgba(255,64,64,.7)}}

.img-overlay{
  position:absolute;bottom:0;left:0;right:0;
  padding:28px 10px 9px;
  background:linear-gradient(transparent,rgba(5,7,16,.92));
  z-index:2;
}
.skins-num{font-size:14px;font-weight:800;color:var(--gold);line-height:1;}
.rank-txt{font-size:9px;color:rgba(245,200,66,.55);margin-top:2px;}

.card-body{padding:10px 11px 13px;}
.acc-name{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.acc-matches{font-size:10px;color:var(--muted);margin-bottom:10px;}

.wa-buy-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  background:linear-gradient(135deg,var(--wa),var(--wa2));
  color:#fff;font-size:11px;font-weight:800;letter-spacing:.3px;
  padding:9px 12px;border-radius:10px;border:none;
  text-decoration:none;cursor:pointer;width:100%;
  box-shadow:0 3px 12px rgba(37,211,102,.28);
  transition:transform .2s,box-shadow .2s;
}
.wa-buy-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,211,102,.5);}

/* ── DIVIDER ── */
.divider{
  height:1px;margin:28px 16px 0;
  background:linear-gradient(90deg,transparent,rgba(245,200,66,.2),transparent);
}

/* ── BOTTOM CTA ── */
.cta-section{margin:24px 16px 0;}
.cta-box{
  background:linear-gradient(160deg,rgba(37,211,102,.08),rgba(18,140,126,.05));
  border:1px solid rgba(37,211,102,.18);
  border-radius:20px;padding:26px 20px;text-align:center;

}
.cta-box::before{
  content:'';position:absolute;top:-30px;left:50%;transform:translateX(-50%);

}
.cta-icon{font-size:38px;margin-bottom:10px;}
.cta-title{
  font-family:'Cinzel',serif;

}
.cta-sub{font-size:12px;color:var(--muted);line-height:1.65;margin-bottom:20px;}
.cta-main-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:linear-gradient(135deg,var(--wa),var(--wa2));
  color:#fff;font-size:15px;font-weight:800;

}
.cta-main-btn:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(37,211,102,.5);}
.trust-badges{display:flex;justify-content:center;gap:18px;margin-top:18px;flex-wrap:wrap;}
.tb{font-size:11px;color:rgba(200,210,230,.45);font-weight:600;}

/* ── FLOAT WA ── */
.float-wa{
  position:fixed;bottom:22px;right:18px;z-index:999;
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--wa),var(--wa2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 28px rgba(37,211,102,.5);
  text-decoration:none;
  animation:floatWA 3s ease-in-out infinite;
  transition:transform .2s;
}
.float-wa:hover{transform:scale(1.12);}
@keyframes floatWA{
  0%,100%{box-shadow:0 6px 28px rgba(37,211,102,.5)}
  50%{box-shadow:0 6px 40px rgba(37,211,102,.75),0 0 0 10px rgba(37,211,102,.08)}
}

@media(max-width:360px){
  .hero-game-title{font-size:16px;}
  .acc-name{font-size:11px;}
  .skins-num{font-size:12px;}
  .h-stat-val{font-size:13px;}
}

/* ── TRUST LINES ── */
.trust-lines{
  display:flex;flex-direction:column;gap:4px;

}

/* ── SHIMMER ON CARDS ── */
.img-wrap::after{

  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.04) 50%,transparent 60%);
